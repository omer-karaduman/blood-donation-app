services:
  db:
    image: postgis/postgis:15-3.3
    container_name: blood_donation_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: blood_donation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # EKLENEN KISIM: Veritabanının gerçekten bağlantı kabul edip etmediğini denetler
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d blood_donation"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: blood_donation_api
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:password123@db:5432/blood_donation
    # EKLENEN KISIM: Sadece "db" servisini değil, onun "sağlıklı" olmasını bekler
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: